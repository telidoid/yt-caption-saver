<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Caption Saver</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 320px;
      padding: 16px;
      margin: 0;
    }
    h1 { font-size: 1rem; margin: 0 0 12px; }
    #status { color: #666; font-size: 0.875rem; }
    #track-list { margin-top: 12px; }
    .track-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    button { cursor: pointer; }
    .format-row { margin-top: 10px; font-size: 0.875rem; }
    .format-row label { display: flex; align-items: center; gap: 8px; }
    select { font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>YT Caption Saver</h1>
  <div id="status">Loading...</div>
  <div class="format-row" id="format-row" style="display:none">
    <label for="format">Format:
      <select id="format">
        <option value="srt">SRT</option>
        <option value="txt">TXT (text only)</option>
      </select>
    </label>
  </div>
  <div id="track-list"></div>
  <script src="popup.js"></script>
</body>
</html>
