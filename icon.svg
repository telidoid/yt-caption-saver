<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Background -->
  <rect width="96" height="96" rx="20" fill="#1a1a2e"/>

  <!-- Speech bubble body -->
  <rect x="12" y="14" width="72" height="48" rx="8" fill="#3ea6ff"/>
  <!-- Speech bubble tail -->
  <polygon points="24,62 36,62 28,74" fill="#3ea6ff"/>

  <!-- Caption lines inside bubble -->
  <rect x="22" y="26" width="36" height="4" rx="2" fill="#1a1a2e"/>
  <rect x="22" y="36" width="52" height="4" rx="2" fill="#1a1a2e"/>
  <rect x="22" y="46" width="28" height="4" rx="2" fill="#1a1a2e"/>

  <!-- CC badge -->
  <rect x="52" y="68" width="32" height="18" rx="5" fill="#3ea6ff"/>
  <text x="68" y="81.5" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="13" fill="#1a1a2e" text-anchor="middle">CC</text>
</svg>
